version: 1
frontend:
  phases:
    preBuild:
      commands:
        - corepack enable
        - npx --yes nypm i
    build:
      commands:
        # Explicitly set the Nitro preset so the build always targets Amplify
        # regardless of how NODE_ENV is set on the branch.
        - export NITRO_PRESET=aws-amplify
        - npm run build
  artifacts:
    # The aws-amplify Nitro preset outputs to .amplify-hosting/
    baseDirectory: .amplify-hosting
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      # Do NOT cache .nuxt – stale generated types can break SSR Lambda.
      # - .nuxt/**/*

